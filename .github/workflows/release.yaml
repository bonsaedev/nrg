name: Release
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no publish, no tags, no GitHub release)"
        type: boolean
        default: false

permissions:
  packages: write
  pull-requests: write
  contents: write
  issues: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Build
        run: pnpm build

      - name: Type Check
        run: pnpm validate:tsc

      - name: Lint
        run: pnpm validate:lint

      - name: Format Check
        run: pnpm validate:format

      # Prove the freshly built tarballs build, typecheck, and boot Node-RED for
      # a real consumer before publishing — guards against a broken artifact.
      - name: Consumer Smoke Test
        run: pnpm test:smoke

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Server Unit Tests
        run: pnpm vitest run --config vitest.sdk.server.unit.config.ts

      - name: Client Unit Tests
        run: pnpm vitest run --config vitest.sdk.client.unit.config.ts

      - name: Vite Unit Tests
        run: pnpm vitest run --config vitest.vite.unit.config.ts

      - name: Client Component Tests
        run: pnpm vitest run --config vitest.sdk.client.component.config.ts

      - name: Vite E2E Tests
        run: pnpm vitest run --config vitest.vite.e2e.config.ts

      - name: Client E2E Tests
        run: pnpm vitest run --config vitest.sdk.client.e2e.config.ts

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: ${{ inputs.dry_run }}
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Trigger docs deployment
        if: steps.semantic.outputs.new_release_published == 'true' && inputs.dry_run == false
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_PAT }}
          event-type: deploy-docs
