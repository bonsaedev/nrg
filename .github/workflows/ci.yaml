name: CI
on:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Type Check
        run: pnpm validate:tsc

      - name: Lint
        run: pnpm validate:lint

      - name: Format Check
        run: pnpm validate:format

      - name: Server Unit Tests
        run: pnpm vitest run --config vitest.core.server.unit.config.ts --coverage

      - name: Client Unit Tests
        run: pnpm vitest run --config vitest.core.client.unit.config.ts --coverage

      - name: Vite Unit Tests
        run: pnpm vitest run --config vitest.vite.unit.config.ts --coverage

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: pnpm build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  vite-e2e:
    name: Vite E2E Tests (Node ${{ matrix.node-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.19, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Vite E2E Tests
        run: pnpm vitest run --config vitest.vite.e2e.config.ts --coverage

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  client-component:
    name: Client Component Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Client Component Tests
        run: pnpm vitest run --config vitest.core.client.component.config.ts --coverage

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  client-e2e:
    name: Client E2E Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Download Build Artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Client E2E Tests
        run: pnpm vitest run --config vitest.core.client.e2e.config.ts

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: client-e2e-screenshots
          path: test-results/screenshots/
          if-no-files-found: ignore

  vite-integration:
    name: Vite Integration Tests (${{ matrix.os }})
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Vite Integration Tests
        run: pnpm tsx tests/vite/integration/vite-integration.ts --timeout=300000
